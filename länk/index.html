.orbs { position:fixed; inset:0; z-index:1; pointer-events:none; }
.orb {

 animation: drift ease-in-out infinite;
}
@keyframes drift {
 0%,100% { transform: translateY(0) scale(1); }
 50% { transform: translateY(-20px) scale(1.05); }
}
.content {

}
.av-wrap { position:relative; width:108px; height:108px; margin-bottom:1.2rem; }
.av-ring {
 position:absolute; inset:-2px; border-radius:50%;

 animation: spin 12s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.av-inner {
 position:absolute; inset:2px; border-radius:50%;

}
.av-img {

}

@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.3;} }

}
.btn-primary {

 0 0 30px rgba(160,128,96,0.15),
 0 8px 24px rgba(0,0,0,0.25),
 inset 0 1px 0 rgba(210,190,160,0.2);
}
.btn:active { transform: scale(0.98); }
@media (hover:hover) {

}

 function get(u,e){return fetch(u,{cache:'no-store'}).then(r=>r.json()).then(d=>{var v=e(d);if(!v||v.trim().length<2)throw 0;return v;});}

})();
